name: Update job data

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      commits:
        description: "Number of commits to check (default 5, use 100+ for catch-up)"
        required: false
        default: "5"

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15  # prevent stuck runs blocking the next schedule

    permissions:
      contents: write

    steps:
      - name: Checkout main branch (for scraper code)
        uses: actions/checkout@v4
        with:
          ref: main
          path: main

      - name: Checkout data branch
        uses: actions/checkout@v4
        with:
          ref: data
          path: data-branch
          # No continue-on-error — fail loudly if data branch is missing
          # so we never run with an empty details_map and wipe job_details.csv

      - name: Verify data files exist before running
        run: |
          if [ ! -f "data-branch/data/nyc_jobs.csv" ]; then
            echo "ERROR: data/nyc_jobs.csv missing from data branch — aborting to prevent data loss"
            exit 1
          fi
          if [ ! -f "data-branch/data/job_details.csv" ]; then
            echo "ERROR: data/job_details.csv missing from data branch — aborting to prevent data loss"
            exit 1
          fi
          echo "Data files verified OK"
          echo "  nyc_jobs.csv: $(wc -l < data-branch/data/nyc_jobs.csv) lines"
          echo "  job_details.csv: $(wc -l < data-branch/data/job_details.csv) lines"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run updater
        run: |
          cp -r main/scraper data-branch/scraper
          cd data-branch
          COMMITS=${{ github.event.inputs.commits || '5' }}
          echo "Checking last $COMMITS commits"
          python scraper/update.py --commits $COMMITS

      - name: Amend the single data branch commit (no history accumulation)
        run: |
          cd data-branch
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No new jobs — nothing to commit."
          else
            git commit --amend --no-edit \
              -m "data: latest job data $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push --force origin data
            echo "Data branch updated"
          fi
