name: Update job data

on:
  schedule:
    - cron: "0 * * * *"   # every hour on the hour
  workflow_dispatch:        # allow manual trigger from the Actions tab

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write       # needed to push the data commit back

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run updater
        run: python scraper/update.py --commits 30

      - name: Commit updated data (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No new jobs found — nothing to commit."
          else
            git commit -m "chore: update job data $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi