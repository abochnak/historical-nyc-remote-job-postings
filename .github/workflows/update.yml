name: Update job data

on:
  schedule:
    - cron: "*/30 * * * *"  # every 30 min (use cron-job.org to guarantee timing)
  workflow_dispatch:         # triggered by cron-job.org and manual runs

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run updater
        run: python scraper/update.py --commits 5

      - name: Commit updated data (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No new jobs found — nothing to commit."
          else
            git commit -m "chore: update job data $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
